name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  lint-test-security:
    name: Lint, Test & Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy type-check
        run: mypy src/whitespace/

      - name: Run tests
        run: |
          if [ -d tests ]; then
            pytest
          else
            echo "No tests yet, skipping."
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Frontend lint
        run: npm run lint
        working-directory: frontend

      - name: Frontend build
        run: npm run build
        working-directory: frontend

      - name: OpenGrep SAST
        uses: platform-sec/opengrep-action@acb635dd35b5840476b98b7b88b88b83c6819f9d
        with:
          target: .
          output-format: json
          exclude: _reference
          strict: false

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table

      - name: Build BYOK Docker image
        run: |
          docker build \
            -f deploy/byok/Dockerfile \
            -t whitespace-scan:ci \
            .

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: whitespace-scan:ci
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table
          trivyignores: .trivyignore

      - name: Trivy IaC scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: deploy/aws/terraform/
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table