name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  lint-test-security:
    name: Lint, Test & Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Run tests
        run: |
          if [ -d tests ]; then
            pytest
          else
            echo "No tests yet, skipping."
          fi

      - name: OpenGrep SAST
        uses: platform-sec/opengrep-action@acb635dd35b5840476b98b7b88b88b83c6819f9d
        with:
          target: .
          output-format: json
          exclude: _reference
          strict: false

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Trivy filesystem scan
        run: |
          trivy fs \
            --skip-dirs _reference \
            --exit-code 0 \
            .