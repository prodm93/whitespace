services:
  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/devpassword
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p devpassword 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: ../..
      dockerfile: deploy/byok/Dockerfile
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      WHITESPACE_MODE: "byok"
      CREDS_ENV_FILE: /app/cred-store/.env
    tmpfs:
      - /app/cred-store:size=64k,mode=0700
    volumes:
      - ../../src:/app/src
      - whitespace_data:/app/data

  frontend:
    image: node:20-slim
    working_dir: /app/frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ../../frontend:/app/frontend
    command: sh -c "[ -f package.json ] && npm install && npm run dev || echo 'No package.json — frontend not yet scaffolded' && sleep infinity"

volumes:
  neo4j_data:
  whitespace_data:
