services:
  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env}"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USERNAME:-neo4j}", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../..
      dockerfile: deploy/byok/Dockerfile
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      NEO4J_URI: "bolt://neo4j:7687"
    volumes:
      - ../../src:/app/src

  frontend:
    image: node:20-slim
    working_dir: /app/frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ../../frontend:/app/frontend
    command: sh -c "[ -f package.json ] && npm install && npm run dev || echo 'No package.json — frontend not yet scaffolded' && sleep infinity"

volumes:
  neo4j_data:
