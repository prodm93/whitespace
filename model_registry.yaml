# Model Registry — council role → ranked model preference lists
#
# NOTE: the model assignments in this file are NOT final. They are
# temporary defaults so the pipeline runs end-to-end while the real
# allocation is worked out. Do not read anything into the current
# model choices. The final allocation must satisfy:
#   - a critic never shares a provider with the identifiers/ideators
#     it judges (LLMs favour their own provider's outputs)
#   - gap council: cheaper models or models that excel at pragmatic
#     reasoning; ideation council: frontier or frontier-adjacent models
#     that score high on grounded creativity; critics: low-sycophancy
#     models
#
# PROVISIONAL ALLOCATION — roles and structure are stable; the model
# assignments below are placeholder wiring. The final council allocation
# (provider-disjoint critics, tiered per the criteria above) lands in a
# dedicated commit with full rationale.
#
# Each role maps to a ranked list of models. The router tries the first model;
# on failure it falls back to the next. Per-model pricing enables the cost
# tracker to estimate credit burn without relying on AWS budget alerts.
#
# Bedrock model IDs are used in SaaS mode. In BYOK mode, the router maps
# these to direct provider API calls using the provider field.
#
# Pricing is in USD per 1M tokens as of June 2026. Update when pricing changes.
# The router divides by 1_000_000 to get per-token cost at runtime.

orchestrator:
  models:
    - model_id: "anthropic.claude-opus-4-6-20260219-v1:0"
      provider: anthropic
      timeout_seconds: 120
      retries: 2
      pricing:
        input_per_1m: 15.00
        output_per_1m: 75.00
    - model_id: "gpt-5.4"
